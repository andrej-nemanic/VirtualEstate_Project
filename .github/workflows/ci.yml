name: CI/CD

on:
  push:
    branches: [devel, release]
  pull_request:
    branches: [devel, release]

env:
  PROJECT_DIR: PrincipiPJ-Projektna1/Projektna1_VirtualEstate

jobs:
  # ---------- BUILD + TEST (devel in release) ----------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x ./gradlew

      - name: Build
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assemble

      - name: Run unit tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ${{ env.PROJECT_DIR }}/**/build/reports/tests/

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: ${{ env.PROJECT_DIR }}/**/build/test-results/test/TEST-*.xml
          reporter: java-junit

  # ---------- PACKAGE + DEPLOY (samo release) ----------
  package-and-deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x ./gradlew

      - name: Package application
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew packageDistributionForCurrentOS

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtualestate-package
          path: |
            ${{ env.PROJECT_DIR }}/composeApp/build/compose/binaries/
            ${{ env.PROJECT_DIR }}/composeApp/build/libs/

      - name: Deploy
        run: |
          echo "Deploying VirtualEstate ${{ github.sha }}"
          echo "Paket je na voljo v GitHub Actions -> Artifacts"
          # Tu bi šel realni deploy (scp, rsync, docker push, ...)
